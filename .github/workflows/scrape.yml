name: Scrape Fresh Data

on:
  # Weekly refresh: every Sunday at 03:00 UTC
  schedule:
    - cron: "0 3 * * 0"
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write  # Needed to create releases

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Async scrape typically completes in ~15 min
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r spoonsmap/scripts/requirements.txt

      - name: Fetch pub list
        working-directory: spoonsmap/scripts
        run: python3 1_fetch_pubs.py

      - name: Fetch menus (async scrape)
        working-directory: spoonsmap/scripts
        run: python3 2_fetch_menus.py

      - name: Build map data
        working-directory: spoonsmap/scripts
        run: python3 3_build_map_data.py

      - name: Create dated release with map data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-$(date -u +%Y-%m-%d)"
          # Delete existing release with same tag if re-running on same day
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Create new release with map_data.js attached
          gh release create "$TAG" \
            spoonsmap/data/map_data.js \
            --title "Data scrape $TAG" \
            --notes "Automated price data scrape from $(date -u +%Y-%m-%d)" \
            --latest
